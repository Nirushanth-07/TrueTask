<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#070a10"/>
    </radialGradient>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="check-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="60%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="50%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="120" fill="url(#bg-glow)" stroke="rgba(255, 255, 255, 0.04)" stroke-width="4"/>
  <circle cx="256" cy="256" r="160" fill="#3b82f6" opacity="0.05" filter="url(#neon-glow)"/>
  <g transform="translate(256, 256) translate(-120, -150)">
    <rect x="0" y="0" width="240" height="300" rx="24" fill="rgba(15, 23, 42, 0.75)" stroke="url(#border-grad)" stroke-width="6"/>
    <rect x="-14" y="45" width="28" height="12" rx="6" fill="url(#ring-grad)" stroke="#0f172a" stroke-width="2"/>
    <rect x="-14" y="105" width="28" height="12" rx="6" fill="url(#ring-grad)" stroke="#0f172a" stroke-width="2"/>
    <rect x="-14" y="165" width="28" height="12" rx="6" fill="url(#ring-grad)" stroke="#0f172a" stroke-width="2"/>
    <rect x="-14" y="225" width="28" height="12" rx="6" fill="url(#ring-grad)" stroke="#0f172a" stroke-width="2"/>
    <line x1="85" y1="80" x2="190" y2="80" stroke="#334155" stroke-width="6" stroke-linecap="round"/>
    <line x1="85" y1="140" x2="190" y2="140" stroke="#334155" stroke-width="6" stroke-linecap="round"/>
    <line x1="85" y1="200" x2="190" y2="200" stroke="#334155" stroke-width="6" stroke-linecap="round"/>
    <rect x="45" y="68" width="22" height="22" rx="6" fill="none" stroke="#475569" stroke-width="4"/>
    <rect x="45" y="128" width="22" height="22" rx="6" fill="none" stroke="#475569" stroke-width="4"/>
    <path d="M 36 195 L 75 235 L 205 95" fill="none" stroke="url(#check-grad)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" filter="url(#neon-glow)"/>
  </g>
